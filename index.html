<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Live Scraper</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .commentary { margin: 20px; padding: 20px; background: #fff; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="commentary">
        <h1>IPL Live Scores and Commentary</h1>
        <div id="scores"></div>
        <div id="ball-by-ball"></div>
    </div>
    <script>
        function fetchLiveData() {
            $.get('https://api.allorigins.win/get?url=https://www.cricbuzz.com/live-cricket-scorecard/12345', function(data) {
                var jsonData = JSON.parse(data.contents);
                $('#scores').html('<h2>' + jsonData.score + '</h2>');
                $('#ball-by-ball').html(jsonData.commentary);
            });
        }
        setInterval(fetchLiveData, 5000);
        fetchLiveData();
    </script>
</body>
</html>
